# Volume anchors - reusable volume definitions
x-pg-hba: &pg-hba
  ./configs/postgres/conf/pg_hba.conf:/pg_hba.conf

x-pg-conf: &pg-conf
  ./configs/postgres/conf/postgresql.conf:/postgresql.conf

x-pg-init: &pg-init
  ./configs/postgres/init/:/docker-entrypoint-initdb.d

volumes:
  pgdata:

services:
  postgres:
    cap_add:
      - ALL
    init: true
    command:
      - /usr/local/bin/docker-entrypoint.sh
      - -c
      - config_file=/postgresql.conf
    env_file:
      - .env
    environment:
      PGDATA: /data/pg
      POSTGRES_DB: ${XPGDATABASE}
      POSTGRES_PASSWORD: ${XPGPASSWORD}
      POSTGRES_USER: ${XPGUSER}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --host localhost -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 1s
      timeout: 1s
      retries: 5
      start_period: 30s
    image: registry.hub.docker.com/library/postgres:18
    shm_size: 1024M
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEM_LIMIT:-3g}
    memswap_limit: ${POSTGRES_MEM_LIMIT:-3g}
    ulimits:
      core: 0
    volumes:
      - *pg-hba
      - *pg-conf
      - *pg-init
      - pgdata:/data/pg
      - ${HOME}/.psqlrc:/var/lib/postgresql/.psqlrc:ro
      - ${HOME}/.psql_history:/var/lib/postgresql/.psql_history

  apiservice:
    build:
      context: ./
      dockerfile: ./api/Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
    image: arcane_tutor/apiservice:${IMAGE_TAG:-latest}
    shm_size: 3000M
    cap_add:
      - ALL
    command:
      - dumb-init
      - --
      - python
      - -m
      - api.entrypoint
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ENABLE_CACHE: ${ENABLE_CACHE:-false}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      HONEYBADGER_API_KEY: ${HONEYBADGER_API_KEY:-}
      HOSTNAME: ${HOSTNAME}
      PGDATABASE: ${XPGDATABASE}
      PGHOST: postgres
      PGPASSWORD: ${XPGPASSWORD}
      PGUSER: ${XPGUSER}
      PYTHONUNBUFFERED: true
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - --user-agent
        - healthcheck
        - localhost:8080/get_pid
      interval: 5s
      timeout: 1s
      retries: 60
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1875m
    memswap_limit: 1875m
    ports:
      - "${API_PORT:-28080}:8080"
    ulimits:
      core: 0
    user: 1000:1000
    volumes:
      - ./data/api/${APP_ENV:-dev}/:/data/api
      - ./api/static:/app/api/static

  client:
    build:
      context: ./
      dockerfile: ./client/Dockerfile
    image: arcane_tutor/client:${IMAGE_TAG:-latest}
    command:
      - dumb-init
      - --
      - sleep
      - infinity
    depends_on:
      apiservice:
        condition: service_started
    env_file:
      - .env
    environment:
      API_URL: http://apiservice:8080
      BATCH_SIZE: 50
      PYTHONUNBUFFERED: true
      QUERY_DELAY: 0.1
    deploy:
      resources:
        limits:
          memory: 8m
    memswap_limit: 8m
    ulimits:
      core: 0
    user: 1000:1000

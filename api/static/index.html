<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Warm the autocomplete catalog WITHOUT joining the critical request chain:
      // the promise exists immediately (consumers await it), but the ~9KB /get_catalog
      // fetch - larger than app.min.js - starts only once the browser is idle or the
      // user reaches for the search box, whichever comes first. Nothing needs it
      // before first paint. (JS comments are stripped by minify_js; HTML comments
      // would ship - keep_comments=True protects the SERVER_SIDE_* splice anchors.)
      (function () {
        if (window.commonCardTypesPromise) {
          return;
        }
        function fetchWithRetry() {
          return fetch('/get_catalog')
            .then(function (response) {
              if (response.status === 503) {
                var delay = 10000 + Math.random() * 5000;
                console.warn('Common card types not ready, retrying in ' + Math.round(delay / 1000) + 's');
                return new Promise(function (resolve) {
                  setTimeout(resolve, delay);
                }).then(fetchWithRetry);
              }
              if (!response.ok) {
                console.error('Failed to fetch common card types and keywords: HTTP ' + response.status);
                return { types: {}, keywords: {} };
              }
              return response.json();
            })
            .catch(function (error) {
              console.error('Failed to fetch common card types and keywords:', error);
              return { types: {}, keywords: {} };
            });
        }
        var resolveCatalog;
        window.commonCardTypesPromise = new Promise(function (resolve) {
          resolveCatalog = resolve;
        });
        var started = false;
        function start() {
          if (started) {
            return;
          }
          started = true;
          fetchWithRetry().then(resolveCatalog);
        }
        if (window.requestIdleCallback) {
          window.requestIdleCallback(start, { timeout: 2000 });
        } else {
          setTimeout(start, 2000);
        }
        // focusin delegates: the search input doesn't exist yet at head-parse time
        document.addEventListener('focusin', function (event) {
          if (event.target && event.target.id === 'searchInput') {
            start();
          }
        });
      })();
    </script>
    <meta
      name="description"
      content="Search for Magic: The Gathering cards. Find MTG cards by name, type, text, mana cost, and more. Open source Scryfall implementation."
    />
    <meta name="theme-color" content="#2b8fdf" />
    <meta property="og:title" content="%%%SITENAME%%% - Magic: The Gathering Card Search" />
    <meta
      property="og:description"
      content="Search for Magic: The Gathering cards by name, type, text, mana cost, and more."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/static/social-preview.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <title>%%%SITENAME%%% - Magic: The Gathering Card Search</title>
    <link rel="canonical" href="/" />
    <!-- FAVICON -->
    <!-- PRECONNECTS -->
    <!-- FONTS -->
    <!-- CSS -->
    <script src="/static/app.min.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span id="themeIcon">☀️</span>
        </button>
        <h1 id="site-title">%%%SITENAME%%%</h1>
        <p>Search for Magic: The Gathering cards</p>
      </div>

      <div class="spacer spacer-20"></div>

      <form method="GET" action="" class="search-container">
        <div class="search-box">
          <input
            type="text"
            class="search-input"
            placeholder="Search for cards by name, type, or text..."
            id="searchInput"
            name="q"
            autocapitalize="off"
            autocorrect="off"
          />
          <a
            class="help-icon"
            href="https://github.com/jbylund/sylvan_librarian/blob/main/docs/user/help.md"
            target="_blank"
            rel="noreferrer"
            aria-label="How to search"
            title="How to search"
            >?</a
          >
        </div>
        <div class="order-controls">
          <label for="orderDropdown" class="dropdown-label">Order By:</label>
          <select class="order-dropdown" id="orderDropdown" name="orderby">
            <option value="edhrec">EDHREC</option>
            <option value="name">Name</option>
            <option value="cubecobra">CubeCobra</option>
            <option value="cmc">CMC</option>
            <option value="power">Power</option>
            <option value="toughness">Toughness</option>
            <option value="rarity">Rarity</option>
            <option value="usd">USD</option>
          </select>
          <label for="uniqueDropdown" class="dropdown-label">Unique Mode:</label>
          <select class="order-dropdown" id="uniqueDropdown" name="unique">
            <option value="card">Cards</option>
            <option value="artwork">Artwork</option>
            <option value="printing">Printings</option>
          </select>
          <label for="preferDropdown" class="dropdown-label">Prefer:</label>
          <select class="order-dropdown" id="preferDropdown" name="prefer">
            <option value="default">Default</option>
            <option value="oldest">Oldest</option>
            <option value="newest">Newest</option>
            <option value="usd-low">$ Low</option>
            <option value="usd-high">$ High</option>
            <option value="promo">Promo</option>
          </select>
          <input type="hidden" name="direction" id="directionInput" value="asc" />
          <button type="button" class="order-toggle" id="orderToggle" title="Toggle ascending/descending">
            <span class="arrow-up">↑</span>
          </button>
        </div>
      </form>

      <div class="spacer spacer-20"></div>

      <div id="statusMessage" aria-live="polite"><!-- SERVER_SIDE_RESULTS_COUNT --></div>
      <div class="spacer spacer-20"></div>
      <div id="results" class="results-container"><!-- SERVER_SIDE_RESULTS --></div>

      <!-- FOOTER -->
    </div>

    <div id="modalOverlay" class="modal-overlay">
      <div id="modalContent" class="modal-content"></div>
    </div>
    <script>
      <!-- SERVER_SIDE_EMBEDDED_DATA -->
    </script>
  </body>
</html>

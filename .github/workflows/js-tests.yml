name: JS Tests

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - '**/*.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/js-tests.yml'

permissions:
  contents: read

jobs:
  js-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run jest
        run: npx jest
